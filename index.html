<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please Forgive Me...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* Starry Background Animation */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveStars 50s linear infinite;
        }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 500px; } }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 85%;
            display: none;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.5s ease;
        }
        .active {
            display: block;
            transform: scale(1);
            opacity: 1;
        }

        h1 { color: #ff9a9e; font-size: 26px; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.6; color: #e0e0e0; min-height: 60px; }
        
        button {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333; border: none; padding: 12px 28px; font-size: 16px;
            border-radius: 25px; cursor: pointer; font-weight: 600;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            margin-top: 15px;
            z-index: 10;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 154, 158, 0.6); }
        
        .btn-container {
            position: relative; height: 80px; display: flex;
            justify-content: center; align-items: center; gap: 20px;
            margin-top: 20px;
        }
        
        #noBtn {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: left 0.2s ease, top 0.2s ease; /* Smooth movement */
        }

        /* Confetti Hearts */
        .floating-heart {
            position: absolute; font-size: 30px; animation: floatUp 3s ease-in-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <!-- PAGE 1 -->
    <div id="page1" class="glass-card active">
        <h1>Hey... 🥺</h1>
        <p id="typeText1"></p>
        <button id="btn1" style="display:none;" onclick="nextPage(1)">Aage dekho...</button>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="glass-card">
        <h1>I Am Really Sorry!</h1>
        <p id="typeText2"></p>
        <button id="btn2" style="display:none;" onclick="nextPage(2)">Ek aakhiri baat...</button>
    </div>

    <!-- PAGE 3 -->
    <div id="page3" class="glass-card">
        <h1>Kya tum mujhe maaf karogi? ❤️</h1>
        <p>Bhale hi hum abhi aamne-saamne milkar isko theek nahi kar sakte, par kya meri is choti si koshish ke liye gussa chhodogi?</p>
        <div class="btn-container">
            <button id="yesBtn" onclick="showFinal()">Haan, kar diya ✨</button>
            <!-- Added event parameter to catch touches -->
            <button id="noBtn" onmouseover="runAway(event)" ontouchstart="runAway(event)">Nahi 😤</button>
        </div>
    </div>

    <!-- PAGE 4 -->
    <div id="page4" class="glass-card">
        <h1>Thank You! 🥰</h1>
        <p>Tum sach mein sabse best ho. Promise, ab se tumhe aise hurt nahi karunga!</p>
        <div id="heartContainer" style="height: 50px; position: relative;"></div>
    </div>

    <script>
        // Typing Effect Logic
        function typeWriter(text, elementId, btnId, speed = 40) {
            let i = 0;
            let el = document.getElementById(elementId);
            el.innerHTML = '';
            document.getElementById(btnId).style.display = 'none';
            
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    document.getElementById(btnId).style.display = 'inline-block';
                }
            }
            type();
        }

        window.onload = function() {
            typeWriter("Mujhe pata hai tumhara gussa hona bilkul banta hai. Par kya thodi der ke liye meri baat sunogi?", "typeText1", "btn1");
        }

        function nextPage(current) {
            document.getElementById('page' + current).classList.remove('active');
            setTimeout(() => {
                document.getElementById('page' + (current + 1)).classList.add('active');
                
                if(current === 1) {
                    typeWriter("Mera irada tumhe hurt karne ka bilkul nahi tha. Mujhe meri galti ka ehsaas hai aur main sach mein bohot sharminda hoon.", "typeText2", "btn2");
                }
            }, 300);
        }

        // New and Improved Runaway logic
        function runAway(e) {
            // Touch ya click ko default action lene se rokna
            if(e) e.preventDefault(); 

            let btn = document.getElementById('noBtn');
            
            // Screen ki poori width aur height
            let windowWidth = window.innerWidth;
            let windowHeight = window.innerHeight;

            // Button ko screen ke andar rakhne ke liye calculation
            let maxX = windowWidth - btn.offsetWidth - 20;
            let maxY = windowHeight - btn.offsetHeight - 20;

            // Nayi random position
            let newX = Math.random() * maxX;
            let newY = Math.random() * maxY;

            // Button ko uski current jagah se nikal kar screen par freely move karna
            btn.style.position = 'fixed';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        // Final Celebration
        function showFinal() {
            document.getElementById('page3').classList.remove('active');
            setTimeout(() => {
                document.getElementById('page4').classList.add('active');
                createHearts();
            }, 300);
        }

        function createHearts() {
            let container = document.getElementById('heartContainer');
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    let heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.className = 'floating-heart';
                    heart.style.left = (Math.random() * 100) + '%';
                    container.appendChild(heart);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
